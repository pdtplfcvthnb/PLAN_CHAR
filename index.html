    // ==================== ПОИСК МАРШРУТА ====================
    function findRouteByPoints(startName, endName) {
        const key1 = `${startName}_${endName}`;
        const key2 = `${endName}_${startName}`;
        
        if(routes[key1]) return routes[key1];
        if(routes[key2]) return [...routes[key2]].reverse();
        return null;
    }
    
    // ==================== ОТРИСОВКА ====================
    function showFloor(floor) {
        currentFloor = floor;
        
        document.querySelectorAll('.floor-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i+1 === floor);
        });
        
        if(images[floor] && images[floor].complete) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(images[floor], 0, 0, canvas.width, canvas.height);
        }
        drawAllPoints();
        if(currentRoute) drawRoute(currentRoute);
    }
    
    function drawAllPoints() {
        for(let id in allPoints) {
            const p = allPoints[id];
            if(p.floor === currentFloor) {
                if(p.name === "ВХОД") {
                    ctx.fillStyle = '#20c997';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 7, 0, 2*Math.PI);
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#007bff';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
                    ctx.fill();
                }
                ctx.fillStyle = '#333';
                ctx.font = '10px Arial';
                ctx.fillText(p.name, p.x + 8, p.y - 5);
            }
        }
    }
    
    function drawRoute(route) {
        if(!route || route.length < 2) return;
        
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#8b0000';
        ctx.beginPath();
        
        let first = true;
        for(let point of route) {
            if(point.floor === currentFloor) {
                if(first) {
                    ctx.moveTo(point.x, point.y);
                    first = false;
                } else {
                    ctx.lineTo(point.x, point.y);
                }
            } else {
                first = true;
                ctx.stroke();
                ctx.beginPath();
            }
        }
        ctx.stroke();
        
        if(route[0] && route[0].floor === currentFloor) {
            ctx.fillStyle = '#00cc00';
            ctx.beginPath();
            ctx.arc(route[0].x, route[0].y, 8, 0, 2*Math.PI);
            ctx.fill();
        }
        if(route[route.length-1] && route[route.length-1].floor === currentFloor) {
            ctx.fillStyle = '#dc3545';
            ctx.beginPath();
            ctx.arc(route[route.length-1].x, route[route.length-1].y, 8, 0, 2*Math.PI);
            ctx.fill();
        }
    }
    
    function findRoute() {
        const startName = document.getElementById('startSelect').value;
        const endName = document.getElementById('endSelect').value;
        
        if(!startName || !endName) {
            alert('Выберите начальную и конечную точку!');
            return;
        }
        
        const route = findRouteByPoints(startName, endName);
        
        if(!route) {
            document.getElementById('routeInfo').innerHTML = `
                ❌ Маршрут от "${startName}" до "${endName}" не задан!<br><br>
            `;
        } else {
            currentRoute = route;
            showFloor(currentFloor);
            
            let text = "🗺️ Маршрут: ";
            for(let i=0; i<route.length; i++) {
                text += route[i].name;
                if(i < route.length-1) text += " → ";
            }
            document.getElementById('routeInfo').innerHTML = text;
        }
    }
    
    function clearRoute() {
        currentRoute = null;
        showFloor(currentFloor);
        document.getElementById('routeInfo').innerHTML = '🗑️ Маршрут очищен';
    }
    
    // Заполнение списков
    function populateSelects() {
        const startSelect = document.getElementById('startSelect');
        const endSelect = document.getElementById('endSelect');
        
        const sorted = Object.keys(allPoints).sort((a,b) => {
            if(allPoints[a].floor !== allPoints[b].floor) return allPoints[a].floor - allPoints[b].floor;
            return allPoints[a].name.localeCompare(allPoints[b].name);
        });
        
        for(let id of sorted) {
            const p = allPoints[id];
            const opt1 = document.createElement('option');
            opt1.value = p.name;
            opt1.textContent = `${p.name} (${p.floor} эт.)`;
            startSelect.appendChild(opt1);
            
            const opt2 = document.createElement('option');
            opt2.value = p.name;
            opt2.textContent = `${p.name} (${p.floor} эт.)`;
            endSelect.appendChild(opt2);
        }
    }
    
    // Загрузка картинок
    let loaded = 0;
    for(let i=1; i<=3; i++) {
        images[i].onload = () => { loaded++; if(loaded===3) { populateSelects(); showFloor(2); } };
        images[i].onerror = () => { loaded++; if(loaded===3) { populateSelects(); showFloor(2); } };
    }
    setTimeout(() => { if(loaded<3) { populateSelects(); showFloor(2); } }, 2000);
